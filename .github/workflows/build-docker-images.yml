name: Build Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AMD64 Image Archive
        run: |
          mkdir -p dist
          docker buildx build \
            --platform linux/amd64 \
            -t chinese-typing-test:latest \
            --output type=docker,dest=dist/chinese-typing-test-latest-linux-amd64.tar \
            .

      - name: Build ARM64 Image Archive
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t chinese-typing-test:latest \
            --output type=docker,dest=dist/chinese-typing-test-latest-linux-arm64.tar \
            .

      - name: Compress Archives
        run: gzip -9 dist/*.tar

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: dist/*.tar.gz
